<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee & Student Records</title>
    <meta name="description" content="A modern dashboard for viewing and managing employee and student records with sorting and filtering capabilities.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h1>Directory Insights</h1>
                <p>Manage and discover talent across departments</p>
            </div>
            <div class="header-actions">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=6366f1&color=fff" alt="Admin Profile">
                    <span>Admin</span>
                </div>
            </div>
        </header>

        <section class="overview-section">
            <h2>Department Highlights</h2>
            <div class="stats-grid" id="statsGrid">
                <!-- Department counts will be dynamically inserted here -->
            </div>
        </section>

        <section class="controls-section">
            <div class="search-wrap">
                <i class="fa fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name...">
            </div>
            
            <div class="filter-wrap">
                <div class="custom-select">
                    <select id="departmentFilter">
                        <option value="All">All Departments</option>
                        <!-- Dynamic options will go here -->
                    </select>
                </div>
                
                <div class="custom-select">
                    <select id="sortControl">
                        <option value="name-asc">Sort by Name (A-Z)</option>
                        <option value="name-desc">Sort by Name (Z-A)</option>
                        <option value="date-desc">Sort by Date (Newest)</option>
                        <option value="date-asc">Sort by Date (Oldest)</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="records-section">
            <div class="records-grid" id="recordsGrid">
                <!-- Records will be dynamically inserted here -->
            </div>
            <div id="noResults" class="no-results hidden">
                <i class="fa-solid fa-folder-open"></i>
                <h3>No records found</h3>
                <p>Try adjusting your search or filters.</p>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
